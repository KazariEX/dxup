minimumReleaseAge: 0
shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver

packages:
  - packages/*
  - playground

catalog:
  "@nuxt/kit": ^4.4.8
  "@types/node": ^25.9.3
  "@volar/language-core": ^2.4.28
  "@volar/typescript": ^2.4.28
  "@vscode/vsce": ^3.9.2
  "@vue/language-core": ^3.3.5
  "@vue/typescript-plugin": ^3.3.5
  "@zinkawaii/eslint-config": ^0.4.5
  "@zinkawaii/scripts": ^0.0.3
  "@zinkawaii/tsconfig": ^0.1.0
  bumpp: ^11.1.0
  chokidar: ^5.0.0
  eslint: ^10.5.0
  nuxt: ^4.4.8
  pathe: ^2.0.3
  tinyglobby: ^0.2.17
  tsdown: ^0.22.2
  typescript: ^6.0.3
  vitest: ^4.1.8
  vue: ^3.5.38
  vue-router: ^5.1.0
  zx: ^8.8.5

allowBuilds:
  "@parcel/watcher": true
  "@vscode/vsce-sign": true
  esbuild: true
  keytar: true
